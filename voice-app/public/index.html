<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pashto &amp; Dari Voice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="brand">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
    <span>Pashto &amp; Dari Voice</span>
  </div>
  <div class="lang-toggle" role="group" aria-label="Language selection">
    <button class="lang-btn active" data-lang="pashto">پښتو</button>
    <button class="lang-btn" data-lang="dari">دری</button>
  </div>
</header>

<main>

  <!-- ── STT Panel ──────────────────────────────────────────────────────── -->
  <section class="panel" id="stt-panel">
    <div class="panel-header">
      <h2>Voice → Text</h2>
      <span class="badge">STT</span>
    </div>

    <div class="recorder-area">
      <button id="record-btn" class="btn-record" title="Hold to record">
        <span class="mic-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </span>
        <span id="record-label">Start Recording</span>
      </button>
      <span id="record-timer" class="timer hidden">0:00</span>
    </div>

    <div class="divider"><span>or</span></div>

    <label class="upload-zone" for="audio-upload">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      <span id="upload-label">Upload audio file</span>
      <span class="hint">WAV · MP3 · OGG · FLAC · max 5 MB</span>
      <input type="file" id="audio-upload" accept="audio/*" />
    </label>

    <button id="stt-submit" class="btn-primary" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
      Transcribe
    </button>

    <div id="stt-result-wrap" class="result-wrap hidden">
      <div class="result-label">Transcription</div>
      <div id="stt-result" class="result-box rtl"></div>
      <div id="stt-meta" class="meta"></div>
      <button id="stt-copy" class="btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copy
      </button>
    </div>
  </section>

  <!-- ── TTS Panel ──────────────────────────────────────────────────────── -->
  <section class="panel" id="tts-panel">
    <div class="panel-header">
      <h2>Text → Voice</h2>
      <span class="badge tts-badge">TTS</span>
    </div>

    <div class="textarea-wrap">
      <textarea
        id="tts-text"
        class="rtl"
        placeholder="Type Pashto or Dari text here..."
        maxlength="500"
        rows="5"
        spellcheck="false"
      ></textarea>
      <span class="char-count"><span id="char-count">0</span> / 500</span>
    </div>

    <div class="tts-controls">
      <label class="control-row">
        <span>Speed</span>
        <input type="range" id="length-scale" min="0.5" max="2.0" step="0.1" value="1.0" />
        <span id="length-scale-val" class="val-badge">1.0×</span>
      </label>
    </div>

    <button id="tts-submit" class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
      Speak
    </button>

    <div id="tts-audio-wrap" class="audio-wrap hidden">
      <audio id="tts-audio" controls></audio>
      <a id="tts-download" class="btn-ghost" download="speech.wav">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download WAV
      </a>
    </div>
  </section>

</main>

<!-- Loading overlay -->
<div id="loading" class="loading-overlay hidden" role="status" aria-live="polite">
  <div class="spinner"></div>
  <p id="loading-msg">Processing...</p>
  <p class="loading-hint">First request may take ~40 s (cold start)</p>
</div>

<!-- Toast notification -->
<div id="toast" class="toast hidden" role="alert" aria-live="assertive"></div>

<script src="app.js"></script>
</body>
</html>
